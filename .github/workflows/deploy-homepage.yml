name: Deploy PeerSend Homepage

on:
  push:
    branches:
      - main
    paths:
      - "homepage/**"
      - ".github/workflows/deploy-homepage.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: peersend_homepage
  CONTAINER_NAME: peersend_homepage

jobs:
  build-and-push:
    name: Build And Push Homepage Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: homepage/package-lock.json

      - name: Build homepage
        working-directory: homepage
        run: |
          npm ci
          npm run build

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          IMAGE="$DOCKERHUB_USERNAME/${IMAGE_NAME}:main"
          docker build -t "$IMAGE" homepage
          docker push "$IMAGE"

  deploy:
    name: Deploy Homepage To Docker Host Runner
    needs: build-and-push
    runs-on: self-hosted

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      HOMEPAGE_PORT: ${{ vars.HOMEPAGE_PORT }}
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/peersend_homepage:main
      CONTAINER: peersend_homepage

    steps:
      - name: Prepare Docker environment
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR

      - name: Login to Docker Hub
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Pull latest image
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          docker pull "$IMAGE"

      - name: Stop existing container
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          docker stop "$CONTAINER" || true

      - name: Remove existing container
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          docker rm "$CONTAINER" || true

      - name: Run container
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          HOST_PORT="${HOMEPAGE_PORT:-8082}"
          docker run -d --name "$CONTAINER" --restart unless-stopped -e TZ=Asia/Seoul -p ${HOST_PORT}:3000 "$IMAGE"

      - name: Prune old images
        run: |
          unset DOCKER_HOST DOCKER_TLS_CERTDIR
          docker image prune -f
